<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="AI-powered multi-resume ranking agent that analyzes candidates against a job description and produces ranked results with explainable reasoning."/>
  <title>AI Resume Ranking Agent</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"/>
</head>
<body>
  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <h1>AI Resume Ranking Agent</h1>
      <p>Upload resumes &amp; a job description — get AI-powered candidate rankings</p>
      <div class="header-badge"><span class="dot"></span> Powered by GPT</div>
    </header>

    <!-- Step Dots -->
    <div class="steps">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <!-- ═══ UPLOAD VIEW ═══ -->
    <div id="upload-section" style="display:flex; flex-direction:column; gap:20px;">

      <!-- Job Description -->
      <div class="glass-card jd-area">
        <div class="section-title"><span class="icon">📋</span> Job Description</div>
        <textarea id="jd-text" placeholder="Paste the job description here…&#10;&#10;Example: We are looking for a Senior Python Developer with 5+ years experience in FastAPI, Docker, PostgreSQL, and cloud services…"></textarea>
      </div>

      <!-- Resume Upload -->
      <div class="glass-card">
        <div class="section-title"><span class="icon">📎</span> Resumes <span style="color:var(--text-muted); font-weight:400; font-size:0.82rem;">(max 5 · PDF or DOCX)</span></div>
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">📂</div>
          <p>Drag &amp; drop resumes here or <span class="browse-link">browse files</span></p>
          <p class="hint">PDF, DOCX — up to 10 MB each</p>
        </div>
        <input type="file" id="file-input" multiple accept=".pdf,.docx,.doc" hidden/>
        <div class="file-list" id="file-list"></div>
      </div>

      <!-- Submit -->
      <button class="submit-btn" id="submit-btn" disabled>
        <span class="btn-text">🚀 Process &amp; Rank Candidates</span>
      </button>
    </div>

    <!-- ═══ LOADING VIEW ═══ -->
    <div id="loading-section" class="glass-card" style="display:none;">
      <div class="loader-ring"></div>
      <div class="loading-text">Analyzing candidates…</div>
      <div class="loading-step" id="loading-step">Uploading documents…</div>
    </div>

    <!-- ═══ RESULTS VIEW ═══ -->
    <div id="results-section" style="display:none;">
      <div class="summary-banner" id="summary-banner"></div>
      <div id="results-container"></div>
      <div style="text-align:center;">
        <button class="reset-btn" id="reset-btn">← Start Over</button>
      </div>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
